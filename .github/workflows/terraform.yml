name: 'Terraform Azure Policy'

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init -force-copy

    - name: Import Resource Group
      run: |
         terraform state show azurerm_resource_group.rg 2>/dev/null || terraform import azurerm_resource_group.rg /subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/rg-lab-responsibility

    - name: Import Storage Account
      run: |
          terraform state show data.azurerm_storage_account.terraform_state 2>/dev/null || terraform import azurerm_storage_account.terraform_state /subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/rg-lab-responsibility/providers/Microsoft.Storage/storageAccounts/sttfstate2026weu28
    
    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve